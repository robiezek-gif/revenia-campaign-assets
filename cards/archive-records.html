<!DOCTYPE html>
<html>
<head>

<style>

*{
    box-sizing:border-box;
}

html,body{
    margin:0;
    padding:0;
    background:transparent;
}

.archive-record{

    position:relative;

    width:100%;

    max-width:700px;

    margin:auto;
}

.archive-record img{

    width:100%;

    display:block;
}

/* VIDEO POSITION */

.video-frame{

    position:absolute;

    top:22%;

    left:15%;

    width:70%;

    height:50%;

    overflow:hidden;
}

/* VIDEO */

.video-frame video{

    width:100%;

    height:100%;

    object-fit:cover;

    border:none;

    box-shadow:
        0 0 15px rgba(0,0,0,.35);
}

/* SESSION LABEL */

.session-title{

    position:absolute;

    bottom:10%;

    left:50%;

    transform:translateX(-50%);

    color:#4b2d12;

    font-family:Georgia, serif;

    font-size:20px;

    font-weight:bold;

    text-align:center;
}

</style>

</head>

<body>

<div class="archive-record">

    <img src="https://robiezek-gif.github.io/revenia-campaign-assets/refs/heads/main/images/assets-misc/recent-archive-records.png">

    <div class="video-frame">

        <video controls poster="https://raw.githubusercontent.com/robiezek-gif/revenia-campaign-assets/refs/heads/main/images/assets-misc/recent-archive-records.png">

            <source
            src="YOUR-MP4-URL"
            type="video/mp4">

        </video>

    </div>

    <div class="session-title">

        Session 5 — The Waters Remember

    </div>

</div>

</body>
</html>
