<!DOCTYPE html>
<html>
<head>

<style>

*{
    box-sizing:border-box;
}

html,body{
    margin:0;
    padding:0;
    background:transparent;
}

.archive-record{
    position:relative;
    width:100%;
    max-width:700px;
    margin:auto;
}

.archive-record img{
    width:100%;
    display:block;
}

/* VIDEO POSITION */

.video-frame{

    position:absolute;
    top:10%;
    left:17%;
    width:66%;
    aspect-ratio:1/1;
}

/* Decorative Frame */

.player-frame{

    position:absolute;
    inset:0;
    width:100%;
    height:100%;
    object-fit:cover;
    pointer-events:none;
}

/* Actual Video */

.player-video{

    position:absolute;
    top:8%;
    left:8%;
    width:84%;
    height:84%;
}

.player-video video{

    width:100%;
    height:100%;
    object-fit:cover;
    border:none;
}

/* VIDEO */

.video-frame video{
    width:100%;
    height:100%;
    object-fit:cover;
    border:none;
    box-shadow:0 0 15px rgba(0,0,0,.35);
}

/* SESSION LABEL */

.session-title{
    position:absolute;
    bottom:12%;
    left:50%;
    transform:translateX(-50%);
    color:#4b2d12;
    font-family:Georgia, serif;
    font-size:20px;
    font-weight:bold;
    text-align:center;
}

</style>

</head>

<body>

<div class="archive-record">

    <img src="https://robiezek-gif.github.io/revenia-campaign-assets/images/assets-misc/square-bg.png">

    <div class="video-frame">

    <img
        class="player-frame"
        src="https://robiezek-gif.github.io/revenia-campaign-assets/images/assets-misc/square-bg.png">

    <div class="player-video">

        <video controls preload="metadata">

            <source
            src="https://robiezek-gif.github.io/revenia-campaign-assets/audio/Session-04.mp4"
            type="video/mp4">

        </video>

    </div>

</div>
    <div class="session-title">
        Session 4 — The Waters Remember
    </div>

</div>

</body>
</html>
