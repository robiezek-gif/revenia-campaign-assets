<!DOCTYPE html>
<html>
<head>

<style>

*{
    box-sizing:border-box;
}

html,body{
    margin:0;
    padding:0;
    background:transparent;
}

.archive-record{
    position:relative;
    width:100%;
    max-width:700px;
    margin:auto;
}

.archive-record img{
    width:100%;
    display:block;
}

/* VIDEO POSITION */

.video-frame{

    position:absolute;
    top:10%;
    left:17%;
    width:66%;
    aspect-ratio:1/1;
}

/* Decorative Frame */

.player-frame{

    position:absolute;
    inset:0;
    width:100%;
    height:100%;
    object-fit:cover;
    pointer-events:none;
}

/* Actual Video */

.player-video{
    position:absolute;
    top:2%;
    left:2%;
    width:96%;
    height:96%;
}

.player-video video{

    width:100%;
    height:100%;
    object-fit:cover;
    border:none;
}

/* VIDEO */

.video-frame video{
    width:100%;
    height:100%;
    object-fit:cover;
    border:none;
    box-shadow:0 0 15px rgba(0,0,0,.35);
}


</style>

</head>

<body>

<div class="archive-record">

    <img src="https://robiezek-gif.github.io/revenia-campaign-assets/images/assets-misc/square-bg.png">

    <div class="video-frame">

    <img
        class="player-frame"
        src="https://robiezek-gif.github.io/revenia-campaign-assets/images/assets-misc/square-bg.png">

    <div class="player-video">

        <video controls preload="metadata">

            <source
            src="https://robiezek-gif.github.io/revenia-campaign-assets/audio/Session-04.mp4"
            type="video/mp4">

        </video>

    </div>

</div>
    
</div>

</body>
</html>
