<!DOCTYPE html>
<html>

<head>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&display=swap" rel="stylesheet">

<style>

*{
    box-sizing:border-box;
}

html, body{
    margin:0;
    padding:0;
    width:100%;
    overflow-x:hidden;
}

body{
    background:#0b0b0d;
    font-family:'Playfair Display', serif;
}

/* CARD */

.card{

    width:100%;

    display:flex;
    flex-direction:row;

    background:
    linear-gradient(
        to right,
        #111111,
        #090909
    );

    border:2px solid #7a5b2e;

    box-shadow:0 0 30px rgba(0,0,0,.8);

    overflow:hidden;
}

/* IMAGE */

.image-panel{

    flex:1;
    min-width:0;
}

.image-panel img{

    width:100%;
    height:100%;

    min-height:320px;

    object-fit:cover;

    display:block;
}

/* CONTENT */

.content{

    flex:1;

    position:relative;

    display:flex;

    flex-direction:column;

    justify-content:center;

    padding:40px;

    overflow:hidden;

    background:
        linear-gradient(
            to right,
            rgba(17,17,17,.96),
            rgba(9,9,9,.98)
        );
}

/* WATERMARK */

.content::after{

    content:"";

    position:absolute;

    top:50%;
    right:15px;

    transform:translateY(-50%);

    width:260px;
    height:260px;

    background-image:url("https://raw.githubusercontent.com/robiezek-gif/revenia-campaign-assets/main/images/locations/Logo%20only%20no%20background.png");

    background-repeat:no-repeat;
    background-position:center;
    background-size:contain;

    opacity:.08;

    pointer-events:none;

    z-index:1;
}

/* TEXT ABOVE WATERMARK */

.content > *{

    position:relative;

    z-index:2;
}

/* SUBTITLE */

.subtitle{

    font-size:18px;

    letter-spacing:4px;

    text-transform:uppercase;

    color:#b88a44;

    margin-bottom:15px;
}

/* TITLE */

.title{

    font-size:54px;

    line-height:1.1;

    font-weight:700;

    color:#f0e8d8;

    margin-bottom:25px;

    max-width:75%;
}

/* DESCRIPTION */

.description{

    font-size:20px;

    line-height:1.8;

    color:#d8d3c7;

    margin-bottom:30px;

    max-width:75%;
}

/* BUTTON */

.button{

    display:inline-block;

    align-self:flex-start;

    padding:14px 24px;

    border:1px solid #b88a44;

    color:#b88a44;

    text-decoration:none;

    font-size:16px;

    letter-spacing:1px;

    transition:.3s;
}

.button:hover{

    background:#b88a44;

    color:#111111;

    box-shadow:0 0 20px rgba(184,138,68,.5);
}

/* MOBILE */

@media (max-width:600px){

    .card{
        flex-direction:column;
    }

    .image-panel,
    .content{
        width:100%;
    }

    .content{
        padding:25px;
    }

    .title{
        font-size:36px;
        max-width:100%;
    }

    .description{
        font-size:18px;
        max-width:100%;
    }

    .content::after{

        width:180px;
        height:180px;

        opacity:.05;
    }

}

</style>

</head>

<body>

<div class="card">

    <div class="image-panel">

        <img src="IMAGE_URL_HERE">

    </div>

    <div class="content">

        <div class="subtitle">

            FEATURE_TYPE_HERE

        </div>

        <div class="title">

            TITLE_HERE

        </div>

        <div class="description">

            DESCRIPTION_HERE

        </div>

        <a
        class="button"
        href="PAGE_LINK_HERE"
        target="_blank">

            BUTTON_TEXT_HERE →

        </a>

    </div>

</div>

</body>

</html>
