<!DOCTYPE html>
<html>

<head>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&display=swap" rel="stylesheet">

<style>

*{
    box-sizing:border-box;
}

html,body{
    margin:0;
    padding:0;
}

body{

    background:#0b0b0d;

    font-family:'Playfair Display', serif;

    color:#d8d3c7;
}

/* SECTION */

.section{

    .section{

    width:50%;

    margin:0 auto;

    padding:25px;

    border:2px solid #7a5b2e;

    background:

        linear-gradient(
            rgba(17,17,17,.65),
            rgba(9,9,9,.75)
        ),

        url("https://raw.githubusercontent.com/robiezek-gif/revenia-campaign-assets/refs/heads/main/images/assets-misc/site%20BG%20image%20texture%20only.png");

    background-size:150%;

    background-position:center center;

    background-repeat:no-repeat;

    box-shadow:0 0 30px rgba(0,0,0,.8);
}

/* TITLE */

.section-title{

    color:#b88a44;

    font-size:28px;

    letter-spacing:4px;

    text-transform:uppercase;

    margin-bottom:25px;
}

/* HERO GRID */

.hero-grid{

    display:grid;

    grid-template-columns:repeat(4,1fr);

    gap:1px;
}

/* HERO CARD */

.hero-card{

    text-decoration:none;

    color:inherit;

    transition:.3s;
}

.hero-card:hover{

    transform:translateY(-4px);
}

/* IMAGE */

.hero-card img{

    width:100%;

    display:block;
}

/* GOLDEN HOVER GLOW */

.hero-card:hover img{

    box-shadow:
        0 0 12px rgba(184,138,68,.35),
        0 0 25px rgba(184,138,68,.30),
        0 0 45px rgba(184,138,68,.15);
}

/* NAME */

.hero-name{

    margin-top:12px;

    color:#e8dcc2;

    text-align:center;

    font-size:24px;

    font-weight:600;
}

/* CLASS */

.hero-class{

    text-align:center;

    color:#b5ab97;

    font-size:16px;

    margin-top:4px;
}

/* MOBILE */

@media (max-width:1000px){

    .hero-grid{

        grid-template-columns:repeat(2,1fr);
    }

}

@media (max-width:600px){

    .hero-grid{

        grid-template-columns:1fr;
    }

}

</style>

</head>

<body>

<div class="section">

<div class="section-title">

    ✧ HALL OF HEROES

</div>

<div class="hero-grid">

    <a class="hero-card"
    href="https://www.scrybequill.com/share/campaign/e4bcfcf1-90f2-4264-a6e3-9d30b7766f06/player_characters/WgX1xTcPJFXOXKdlT1UT"
    target="_blank">

        <img src="https://raw.githubusercontent.com/robiezek-gif/revenia-campaign-assets/main/images/heroes/Elaria%20framed.png">

        <div class="hero-name">
            ELARIA
        </div>

        <div class="hero-class">
            Elf Wizard
        </div>

    </a>

    <a class="hero-card"
    href="https://www.scrybequill.com/share/campaign/e4bcfcf1-90f2-4264-a6e3-9d30b7766f06/player_characters/y6ElGjVMpRO2dcQdgOBX"
    target="_blank">

        <img src="https://raw.githubusercontent.com/robiezek-gif/revenia-campaign-assets/main/images/heroes/Korgrim%20framed.png">

        <div class="hero-name">
            KORGRIM
        </div>

        <div class="hero-class">
            Dwarf Cleric
        </div>

    </a>

    <a class="hero-card"
    href="https://www.scrybequill.com/share/campaign/e4bcfcf1-90f2-4264-a6e3-9d30b7766f06/player_characters/shViADmkrWiJ0C4VMi0n"
    target="_blank">

        <img src="https://raw.githubusercontent.com/robiezek-gif/revenia-campaign-assets/main/images/heroes/Lokrem%20framed.png">

        <div class="hero-name">
            LOKREM
        </div>

        <div class="hero-class">
            Aasimar Paladin
        </div>

    </a>

    <a class="hero-card"
    href="https://www.scrybequill.com/share/campaign/e4bcfcf1-90f2-4264-a6e3-9d30b7766f06/player_characters/qgpKcrG2II7B9hRw9ZQn"
    target="_blank">

        <img src="https://raw.githubusercontent.com/robiezek-gif/revenia-campaign-assets/main/images/heroes/Sulnaa%20framed.png">

        <div class="hero-name">
            SULNAA
        </div>

        <div class="hero-class">
            Drow Ranger
        </div>

    </a>

</div>

</div>

</body>

</html>
