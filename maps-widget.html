<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
body{
    margin:0;
    background:transparent;
    overflow:hidden;
}

.image-container{
    width:100%;
    cursor:pointer;
}

.image-container img{
    width:100%;
    display:block;
    border-radius:12px;
    transition:.3s;
}

/* Lightbox */

.lightbox{
    display:none;
    position:fixed;
    inset:0;
    background:rgba(0,0,0,.9);
    justify-content:center;
    align-items:center;
    z-index:9999;
}

.lightbox img{
    max-width:95vw;
    max-height:95vh;
    object-fit:contain;
    cursor:zoom-out;
}
</style>
</head>

<body>

<div class="image-container">
    <img
        src="https://raw.githubusercontent.com/robiezek-gif/revenia-campaign-assets/refs/heads/main/images/locations/maps-digitale/Zhori-map.webp"
        alt="Map"
        onclick="openImage(this.src)">
</div>

<div class="lightbox" id="lightbox" onclick="closeImage()">
    <img id="zoomed">
</div>

<script>
function openImage(src){
    document.getElementById("zoomed").src = src;
    document.getElementById("lightbox").style.display="flex";
}

function closeImage(){
    document.getElementById("lightbox").style.display="none";
}
</script>

</body>
</html>
