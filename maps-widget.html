<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Hover Zoom Map</title>

<style>
body{
    margin:0;
    background:transparent;
}

.zoom-box{
    width:100%;
    max-width:900px;
    aspect-ratio:16/9;
    overflow:hidden;
    position:relative;
    cursor:crosshair;
    border-radius:12px;
}

.zoom-box img{
    width:100%;
    height:100%;
    object-fit:cover;

    transform-origin:center center;
    transition:transform .05s linear;
}
</style>
</head>

<body>

<div class="zoom-box" id="box">
    <img
        id="map"
        src="https://raw.githubusercontent.com/robiezek-gif/revenia-campaign-assets/refs/heads/main/images/locations/maps-digitale/Zhori-map.webp"
        alt="Map">
</div>

<script>
const box = document.getElementById("box");
const img = document.getElementById("map");

const zoom = 2.5;

box.addEventListener("mousemove", (e)=>{

    const rect = box.getBoundingClientRect();

    const x = ((e.clientX - rect.left) / rect.width) * 100;
    const y = ((e.clientY - rect.top) / rect.height) * 100;

    img.style.transformOrigin = `${x}% ${y}%`;
    img.style.transform = `scale(${zoom})`;

});

box.addEventListener("mouseleave", ()=>{

    img.style.transformOrigin = "center center";
    img.style.transform = "scale(1)";

});
</script>

</body>
</html>
