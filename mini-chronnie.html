
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Latest Chronicle</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;500;600;700&display=swap" rel="stylesheet">

<style>

*{
    box-sizing:border-box;
}

html,body{
    margin:0;
    padding:0;
    background:transparent;
}

body{

    font-family:'Cinzel', serif;

    background:transparent;
}

.mini-player{

    width:100%;
    max-width:850px;

    margin:0 auto;

    padding:18px;

    background-image:url("https://raw.githubusercontent.com/robiezek-gif/revenia-campaign-assets/refs/heads/main/images/assets-misc/site%20BG%20image%20texture%20only.png");

    background-size:cover;
    background-position:center;

    border:1px solid rgba(212,185,123,.25);

    border-radius:14px;

    box-shadow:
        0 0 20px rgba(0,0,0,.45),
        inset 0 0 40px rgba(255,255,255,.03);
}

.header{

    text-align:center;

    color:#d6bb84;

    font-size:22px;

    letter-spacing:2px;

    margin-bottom:18px;
}

.artwork{

    width:100%;

    height:300px;

    object-fit:cover;

    border-radius:10px;

    display:none;

    border:1px solid rgba(212,185,123,.18);

    margin-bottom:18px;
}

.session{

    color:#bda77a;

    text-align:center;

    font-size:14px;

    letter-spacing:1px;
}

.title{

    color:#f3ead8;

    text-align:center;

    font-size:28px;

    margin-top:6px;

    margin-bottom:8px;
}

.date{

    text-align:center;

    color:#bda77a;

    font-size:14px;

    margin-bottom:18px;
}

audio{

    width:100%;

    margin-bottom:20px;
}

.archive-link{

    display:block;

    text-align:center;

    color:#d6bb84;

    text-decoration:none;

    font-size:14px;

    font-weight:600;

    transition:.25s ease;
}

.archive-link:hover{

    color:#f1ddb1;

    text-shadow:
        0 0 8px rgba(214,187,132,.65),
        0 0 18px rgba(214,187,132,.45);
}

.loading{

    text-align:center;

    color:#d6bb84;

    padding:40px;
}

.error{

    color:#ffb6b6;

    text-align:center;

    padding:20px;
}

@media(max-width:700px){

    .title{

        font-size:22px;
    }

    .artwork{

        height:220px;
    }
}

</style>
</head>

<body>

<div class="mini-player">

    <div class="header">
        ✦ Latest Chronicle ✦
    </div>

    <div id="content">

        <div class="loading">
            Gathering latest chronicle...
        </div>

    </div>

</div>

<script>

const SHEET_URL =
"https://opensheet.elk.sh/1D9aLPsFi_ffoRwHCHJvuiX8EFs7jDGLReOQr2rOMUis/Session-Recaps";

fetch(SHEET_URL)

.then(r => r.json())

.then(data => {

    const latest = data.sort(

        (a,b) =>

        Number(b.Session) -
        Number(a.Session)

    )[0];

    const artworkHTML =

        latest.ArtworkUrl &&
        latest.ArtworkUrl.trim() !== ""

        ?

        `<img
            class="artwork"
            src="${latest.ArtworkUrl}"
            style="display:block;"
        >`

        :

        "";

    document.getElementById("content").innerHTML =

    `

    ${artworkHTML}

    <div class="session">

        Session ${latest.Session}

    </div>

    <div class="title">

        ${latest.Title}

    </div>

    <div class="date">

        ${latest.Date || ""}

    </div>

    <audio controls>

        <source
            src="${latest.AudioURL}"
            type="audio/mpeg">

    </audio>

    <a
        class="archive-link"
        href="YOUR_ARCHIVE_URL_HERE"
        target="_blank">

        Open Chronicle Archive →

    </a>

    `;
})

.catch(error => {

    document.getElementById("content").innerHTML =

    `

    <div class="error">

        Unable to load latest chronicle.

    </div>

    `;
});

</script>

</body>
</html>
