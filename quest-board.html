<!DOCTYPE html>

<html>

<head>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&display=swap" rel="stylesheet">

<style>

*{
    box-sizing:border-box;
}

body{
    margin:0;
    overflow:hidden;
    font-family:'Playfair Display', serif;
    background:transparent;
}

/* ===================================== */
/* BOARD */
/* ===================================== */

.quest-board{

    width:100%;

    background-image:url("https://raw.githubusercontent.com/robiezek-gif/revenia-campaign-assets/refs/heads/main/images/assets-misc/Parchment.png");

    background-size:cover;

    background-position:center;

    border:2px solid #7a5b2e;

    box-shadow:0px 0px 20px rgba(0,0,0,.7);

    color:#d8d3c7;

    overflow:hidden;
}

.board-title{

    padding:18px 24px;

    color:#3a0000;

    font-size:28px;

    font-weight:700;

    letter-spacing:2px;
    
    text-shadow:0px 1px 1px rgba(255,255,255,.15);

    border-bottom:1px solid rgba(184,138,68,.3);
}

.quest-row{

    display:flex;

    align-items:center;

    min-height:90px;

    padding:14px 20px;

    border-bottom:1px solid rgba(80,50,20,.25);

    background:rgba(255,255,255,.12);

    transition:.25s;
}
.quest-row:hover{

    background:rgba(255,255,255,.22);
}

.quest-icon{

    width:60px;
    height:60px;

    margin-right:18px;

    object-fit:contain;
}

.quest-content{

    flex:1;
}

.quest-title{

    color:#000000;

    font-size:24px;

    font-weight:700;

    margin-bottom:4px;
}

.quest-description{

    color:#111111;

    font-size:18px;

    line-height:1.5;
}

.quest-ribbon{

    width:45px;
    height:65px;

    object-fit:contain;
}

.quest-link{

    text-decoration:none;
}

.footer{

    text-align:right;

    padding:16px 24px;
}

.footer a{

    color:#5c3b14;

    text-decoration:none;

    font-size:20px;

    font-weight:600;
}

.footer a:hover{

     color:#3a0000;
}

</style>

</head>

<body>

<script>

/* ===================================== */
/* EDIT ONLY THIS SECTION */
/* ===================================== */

const questArchiveUrl =
"https://www.scrybequill.com/share/campaign/e4bcfcf1-90f2-4264-a6e3-9d30b7766f06";

const quests = [

{
title:"Underwater Ruin",
description:"Mnemosyne Spring revealed a entrance to an underwater ruin. What lies beneath?",
icon:"https://raw.githubusercontent.com/robiezek-gif/revenia-campaign-assets/refs/heads/main/images/assets-misc/Quest%20Emblems/magnifier.png",
ribbon:"https://raw.githubusercontent.com/robiezek-gif/revenia-campaign-assets/refs/heads/main/images/assets-misc/Quest%20Ribbons/Red%20Ribbon.png",
link:"#"
},

{
title:"Sacrifice the Unwilling",
description:"Brother Alren believes he can revive the Willow Snag with the blood of innocents. Help him or stop him.",
icon:"https://raw.githubusercontent.com/robiezek-gif/revenia-campaign-assets/refs/heads/main/images/assets-misc/Quest%20Emblems/sword.png",
ribbon:"https://raw.githubusercontent.com/robiezek-gif/revenia-campaign-assets/refs/heads/main/images/assets-misc/Quest%20Ribbons/Grey%20Ribbon.png",
link:"#"
},

{
title:"Find the Abbey and Reach Zhori",
description:"You were wary of the Abbey of the Living Reliquary. Maybe Zhori is more comfortable. Or at least has answers.",
icon:"https://raw.githubusercontent.com/robiezek-gif/revenia-campaign-assets/refs/heads/main/images/assets-misc/Quest%20Emblems/people.png",
ribbon:"https://raw.githubusercontent.com/robiezek-gif/revenia-campaign-assets/refs/heads/main/images/assets-misc/Quest%20Ribbons/Yellow%20Ribbon.png",
link:"#"
}

];

/* ===================================== */
/* END EDIT SECTION */
/* ===================================== */

</script>

<div class="quest-board">

<div class="board-title">

ACTIVE QUESTS

</div>

<div id="questContainer"></div>

<div class="footer">

<a id="archiveLink" href="#" target="_blank">

View All Quests →

</a>

</div>

</div>

<script>

document.getElementById("archiveLink").href = questArchiveUrl; const container = document.getElementById("questContainer"); quests.forEach(function(quest){ const row = document.createElement("div"); row.className = "quest-row"; row.innerHTML = ` <img class="quest-icon" src="${quest.icon}" > <div class="quest-content"> <div class="quest-title"> ${quest.title} </div> <div class="quest-description"> ${quest.description} </div> </div> <img class="quest-ribbon" src="${quest.ribbon}" > `; container.appendChild(row); });

</script>

</body>

</html>
