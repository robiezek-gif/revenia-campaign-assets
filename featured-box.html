<!DOCTYPE html>
<html>
<head>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@500;600&display=swap" rel="stylesheet">

<style>

*{
    box-sizing:border-box;
    margin:0;
    padding:0;
}

body{
    background:transparent;
}

/* MAIN CONTAINER */

.featured-widget{

    width:420px;

    border:2px solid #7a5b2e;

    background:
        linear-gradient(
            rgba(17,17,17,.65),
            rgba(9,9,9,.75)
        ),
        url("YOUR_BACKGROUND_TEXTURE_HERE");

    background-size:cover;

    overflow:hidden;
}

/* FEATURE BLOCK */

.feature-block{

    position:relative;

    aspect-ratio:1 / 1;

    overflow:hidden;
}

/* IMAGE */

.feature-image{

    position:absolute;
    inset:0;

    width:100%;
    height:100%;

    object-fit:cover;

    transition:.35s ease;
}

/* DARKEN OVERLAY */

.feature-block::after{

    content:"";

    position:absolute;
    inset:0;

    background:rgba(0,0,0,.15);

    transition:.35s ease;

    z-index:1;
}

/* LABEL */

.feature-label{

    position:absolute;

    top:14px;
    left:50%;

    transform:translateX(-50%);

    color:#b88a44;

    font-family:'Cinzel', serif;

    font-size:14px;

    letter-spacing:2px;

    text-transform:uppercase;

    z-index:3;
}

/* NAME */

.feature-name{

    position:absolute;

    top:50%;
    left:50%;

    transform:translate(-50%,-50%);

    width:85%;

    text-align:center;

    color:#f0e4c8;

    font-family:'Cinzel', serif;

    font-size:28px;

    letter-spacing:2px;

    transition:.3s ease;

    z-index:3;
}

/* DESCRIPTION */

.feature-description{

    position:absolute;

    top:50%;
    left:50%;

    transform:translate(-50%,-50%);

    width:85%;

    text-align:center;

    color:#f0e4c8;

    font-size:15px;

    line-height:1.5;

    opacity:0;

    transition:.3s ease;

    z-index:3;
}

/* HOVER EFFECTS */

.feature-block:hover .feature-image{

    filter:brightness(.35);
}

.feature-block:hover::after{

    background:rgba(0,0,0,.55);
}

.feature-block:hover .feature-name{

    opacity:0;
}

.feature-block:hover .feature-description{

    opacity:1;
}

/* DIVIDER */

.feature-divider{

    height:2px;

    background:#7a5b2e;
}

</style>

</head>

<body>

<div class="featured-widget">

    <!-- LOCATION -->

    <div class="feature-block">

        <img
        class="feature-image"
        src="LOCATION_IMAGE_URL">

        <div class="feature-label">
            Featured Location
        </div>

        <div class="feature-name">
            Blackmere Hollow
        </div>

        <div class="feature-description">
            A mist-shrouded village where lanterns burn through the night and travelers vanish along forgotten roads.
        </div>

    </div>

    <div class="feature-divider"></div>

    <!-- CREATURE -->

    <div class="feature-block">

        <img
        class="feature-image"
        src="CREATURE_IMAGE_URL">

        <div class="feature-label">
            Creature Feature
        </div>

        <div class="feature-name">
            Grave Hound
        </div>

        <div class="feature-description">
            These pale predators stalk ancient burial grounds, hunting by scent and the warmth of living souls.
        </div>

    </div>

</div>

</body>
</html>
