<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Rumor Widget Test</title>
</head>

<body style="background:#111;color:white;font-family:Arial;padding:20px;">

<h2>Rumor Widget Test</h2>

<div id="test">
Loading...
</div>

<script>

const SHEET_ID =
"1YKV0Rj5LCPi22B79_RoT5nXoMvrJ7Zc9ywla5MEtJHM";

const SHEET_NAME =
"Whisper-Responses";

const url =
`https://opensheet.elk.sh/${SHEET_ID}/${SHEET_NAME}`;

document.getElementById("rumorList").innerHTML =
`
Trying:

<br><br>

${url}
`;

fetch(url)

.then(response => response.text())

.then(text => {

    document.getElementById("rumorList").innerHTML =

    `<pre>${text.substring(0,1000)}</pre>`;

})

.catch(error => {

    document.getElementById("rumorList").innerHTML =

    `<pre>${error}</pre>`;
});

</script>

</body>
</html>
