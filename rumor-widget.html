<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Recent Rumors</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;500;600;700&display=swap" rel="stylesheet">

<style>

*{
    box-sizing:border-box;
}

body{
    margin:0;
    padding:0;
    background:transparent;
    font-family:'Cinzel', serif;
}

.rumor-widget{

    width:100%;
    max-width:700px;

    margin:0 auto;

    background-image:url("https://raw.githubusercontent.com/robiezek-gif/revenia-campaign-assets/refs/heads/main/images/assets-misc/site%20BG%20image%20texture%20only.png");

    background-size:cover;
    background-position:center;

    border:2px solid rgba(212,185,123,.5);

    border-radius:16px;

    overflow:hidden;

    box-shadow:
        0 0 20px rgba(0,0,0,.4),
        inset 0 0 40px rgba(255,255,255,.03);
}

.header{

    padding:24px 24px 12px 24px;

    border-bottom:1px solid rgba(212,185,123,.2);
}

.header h2{

    margin:0;

    color:#e5d0a0;

    font-size:28px;

    font-weight:700;
}

.header p{

    margin:6px 0 0 0;

    color:#c9b992;

    font-size:13px;

    font-style:italic;
}

.rumor-list{

    padding:10px;
}

.rumor{

    display:flex;

    gap:14px;

    padding:14px;

    margin-bottom:10px;

    background:rgba(0,0,0,.28);

    border:1px solid rgba(212,185,123,.15);

    border-radius:12px;

    transition:.2s;
}

.rumor:hover{

    background:rgba(0,0,0,.4);
}

.token{

    width:60px;
    height:60px;

    min-width:60px;

    border-radius:50%;

    border:2px solid rgba(212,185,123,.4);

    object-fit:cover;
}

.rumor-content{

    flex:1;
}

.rumor-message{

    color:#f0e6d2;

    font-size:14px;

    line-height:1.45;

    margin-bottom:8px;
}

.rumor-meta{

    color:#bca77b;

    font-size:11px;
}

.footer{

    padding:18px;

    text-align:center;

    border-top:1px solid rgba(212,185,123,.15);
}

.footer a{

    color:#e0c48a;

    text-decoration:none;

    font-weight:600;
}

.footer a:hover{

    text-decoration:underline;
}

.loading{

    padding:20px;

    color:#d8c49b;

    text-align:center;
}

.error{

    padding:20px;

    color:#ffb5b5;

    text-align:center;
}

</style>

</head>
<body>

<div class="rumor-widget">

```
<div class="header">
    <h2>✦ Recent Rumors</h2>
    <p>Whispers gathered from across Revenia.</p>
</div>

<div id="rumorList" class="rumor-list">
    <div class="loading">Gathering whispers...</div>
</div>

<div class="footer">
    <a href="#" id="whisperLink">
        View Whisperboard →
    </a>
</div>
```

</div>

<script>

const SHEET_ID =
"1YKV0Rj5LCPi22B79_RoT5nXoMvrJ7Zc9ywla5MEtJHM";

const SHEET_NAME =
"Whisper-Responses";

const tokenMap = {

    "Elaria":
    "https://raw.githubusercontent.com/robiezek-gif/revenia-campaign-assets/refs/heads/main/images/whisperboard/elaria-token.png",

    "Korgnim":
    "https://raw.githubusercontent.com/robiezek-gif/revenia-campaign-assets/refs/heads/main/images/whisperboard/korgrim-token.png",

    "Lokrem":
    "https://raw.githubusercontent.com/robiezek-gif/revenia-campaign-assets/refs/heads/main/images/whisperboard/lokrem-token.png",

    "Sulnaa":
    "https://raw.githubusercontent.com/robiezek-gif/revenia-campaign-assets/refs/heads/main/images/whisperboard/sulnaa-token.png"
};

function timeAgo(dateString){

    const date = new Date(dateString);

    const seconds =
        Math.floor((new Date() - date) / 1000);

    const intervals = {

        year:31536000,
        month:2592000,
        day:86400,
        hour:3600,
        minute:60
    };

    for(const unit in intervals){

        const value =
            Math.floor(seconds / intervals[unit]);

        if(value >= 1){

            return value + unit.charAt(0);
        }
    }

    return "now";
}

const url =
`https://opensheet.elk.sh/${SHEET_ID}/${SHEET_NAME}`;

fetch(url)

.then(response => response.json())

.then(data => {

    const rumors = data
        .filter(row =>
            row["WHISPER TYPE"] &&
            row["WHISPER TYPE"]
            .toLowerCase()
            .includes("rumor"))
        .reverse()
        .slice(0,5);

    const container =
        document.getElementById("rumorList");

    if(rumors.length === 0){

        container.innerHTML =
        `<div class="loading">
            No rumors have been whispered yet.
        </div>`;

        return;
    }

    container.innerHTML = "";

    rumors.forEach(post => {

        const isPC =
            post["Are you PC? (player character)"] === "Yes";

        const characterName =
            isPC
            ? post["PLAYER CHARACTER"]
            : post["CHARACTER NAME"];

        const region =
            post["REGION"] || "Unknown Region";

        const message =
            post["WHAT WOULD YOU LIKE TO WHISPER?"] || "";

        const timestamp =
            post["Timestamp"] || "";

        const token =
            tokenMap[characterName] ||
            "https://raw.githubusercontent.com/robiezek-gif/revenia-campaign-assets/refs/heads/main/images/whisperboard/seal-rumor.png";

        container.innerHTML += `

        <div class="rumor">

            <img
                class="token"
                src="${token}"
                alt="${characterName}"
            >

            <div class="rumor-content">

                <div class="rumor-message">
                    ${message}
                </div>

                <div class="rumor-meta">

                    ${characterName}
                    •
                    ${region}
                    •
                    ${timeAgo(timestamp)}

                </div>

            </div>

        </div>
        `;
    });

})

.catch(error => {

    document.getElementById("rumorList").innerHTML =

    `<div class="error">
        Unable to gather whispers.
        <br><br>
        ${error}
    </div>`;
});

</script>

</body>
</html>
