<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Sheet Test</title>
</head>

<body style="background:#111;color:white;font-family:Arial;padding:20px;">

<h2>Google Sheet Test</h2>

<div id="output">
Testing connection...
</div>

<script>

const sheetID =
"1YKV0Rj5LCPi22B79_RoT5nXoMvrJ7Zc9ywla5MEtJHM";

const sheetName =
"Whisper-Responses";

const url =
`https://opensheet.elk.sh/${sheetID}/${sheetName}`;

document.getElementById("output").innerHTML =
"Trying:<br><br>" + url;

fetch(url)

.then(response => response.text())

.then(text => {

    document.getElementById("output").innerHTML =

    "<h3>Response:</h3><pre>" +

    text.substring(0,2000) +

    "</pre>";

})

.catch(error => {

    document.getElementById("output").innerHTML =

    "<h3>ERROR</h3><pre>" +

    error +

    "</pre>";

});

</script>

</body>
</html>
