<!DOCTYPE html>
<html>

<head>

<style>

body{
    margin:0;
    background:#0b0b0d;
    font-family:Georgia, serif;
}

.card{

    width:700px;
    margin:20px auto;

    background:#111111;

    border:2px solid #7a5b2e;

    box-shadow:0px 0px 25px rgba(0,0,0,.8);

    color:#d8d3c7;

    overflow:hidden;
}

.card img{

    width:100%;
    display:block;
}

.subtitle{

    color:#b88a44;

    letter-spacing:3px;

    font-size:14px;

    padding:20px 25px 0px 25px;
}

.title{

    font-size:42px;

    padding:5px 25px;

    color:#f0e8d8;
}

.description{

    padding:0px 25px 25px 25px;

    line-height:1.8;

    font-size:18px;
}

.button{

    display:inline-block;

    margin:0px 25px 25px 25px;

    padding:12px 24px;

    border:1px solid #b88a44;

    color:#b88a44;

    text-decoration:none;
}

.button:hover{

    background:#b88a44;

    color:black;
}

</style>

</head>

<body>

<div class="card">

<img src="https://raw.githubusercontent.com/robiezek-gif/revenia-campaign-assets/main/images/locations/Mnemosyne%20Entrance.jpg">

<div class="subtitle">

FEATURED LOCATION

</div>

<div class="title">

MNEMOSYNE SPRING

</div>

<div class="description">

Hidden within ancient ruins and veiled by mist, Mnemosyne Spring is said to restore forgotten memories to those who drink from its waters. Whether blessing or curse, none can say with certainty.

</div>

<a class="button">

Explore Location

</a>

</div>

</body>

</html>
