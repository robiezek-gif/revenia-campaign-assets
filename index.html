<!DOCTYPE html>
<html>

<head>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&display=swap" rel="stylesheet">

<style>

body{
    margin:0;
    background:#0b0b0d;
    font-family:'Playfair Display', serif;
}

/* CARD */

.card{
    overflow: hidden;
    position:relative;

    width:100%;
   
    background:linear-gradient(
        to bottom,
        #171717,
        #0b0b0d
    );

    border:2px solid #7a5b2e;

    box-shadow:0px 0px 25px rgba(0,0,0,.8);

    color:#d8d3c7;

    overflow:hidden;
}


/* IMAGE */

.card img{

    width:100%;
    height:250px;

    object-fit:cover;

    display:block;
}

/* CONTENT */

.content{

    position:relative;
    z-index:2;
}

.subtitle{

    color:#b88a44;

    letter-spacing:4px;

    font-size:18px;

    padding:20px 25px 0px 25px;

    text-transform:uppercase;
}

.title{

    font-size:42px;

    font-weight:700;

    padding:5px 25px;

    color:#f0e8d8;

    text-shadow:0px 0px 15px rgba(0,0,0,.8);
}

.description{

    padding:0px 25px 20px 25px;

    line-height:1.7;

    font-size:16px;

    color:#d8d3c7;
}

/* BUTTON */

.button{

    display:inline-block;

    margin:0px 25px 25px 25px;

    padding:10px 20px;

    border:1px solid #b88a44;

    color:#b88a44;

    text-decoration:none;

    transition:.3s;
}

.button:hover{

    background:#b88a44;

    color:black;

    box-shadow:0px 0px 15px rgba(184,138,68,.6);
}

/* MOBILE */

@media (max-width:700px){

.title{
    font-size:30px;
}

.description{
    font-size:15px;
}

}

</style>

</head>

<body>

<div class="card">

<img src="https://raw.githubusercontent.com/robiezek-gif/revenia-campaign-assets/main/images/locations/Mnemosyne%20Entrance.jpg">

<div class="content">

<div class="subtitle">

FEATURED LOCATION

</div>

<div class="title">

MNEMOSYNE SPRING

</div>

<div class="description">

A spring of forgotten memories hidden among ancient ruins.

</div>

<a
class="button"
href="https://sites.google.com/view/archive-of-revenia/mnemosyne-spring"
target="_blank"
>

Explore Location →

</a>

</div>

</div>

</body>

</html>
