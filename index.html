<!DOCTYPE html>
<html>

<head>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&display=swap" rel="stylesheet">

<style>

*{
    box-sizing:border-box;
}

body{
    margin:0;
    background:#0b0b0d;
    font-family:'Playfair Display', serif;
}

/* CARD */

.card{

    width:100%;

    display:flex;

    background:
    linear-gradient(
        to right,
        #111111,
        #0a0908
    );

    border:2px solid #6f4f28;

    overflow:hidden;

    box-shadow:0 0 30px rgba(0,0,0,.7);
}

/* IMAGE */

.image-panel{

    width:45%;

    flex-shrink:0;
}

.image-panel img{

    width:100%;
    height:100%;

    min-height:320px;

    object-fit:cover;

    display:block;
}

/* CONTENT */

.content{

    width:55%;

    padding:40px;

    display:flex;

    flex-direction:column;

    justify-content:center;

    background:
    radial-gradient(
        circle at right,
        rgba(120,80,30,.15),
        transparent 60%
    );
}

/* SUBTITLE */

.subtitle{

    font-size:18px;

    letter-spacing:4px;

    text-transform:uppercase;

    color:#b88a44;

    margin-bottom:14px;
}

/* TITLE */

.title{

    font-size:54px;

    line-height:1.05;

    color:#f0e8d8;

    margin-bottom:25px;

    font-weight:700;
}

/* DESCRIPTION */

.description{

    font-size:20px;

    line-height:1.8;

    color:#d8d3c7;

    max-width:700px;

    margin-bottom:30px;
}

/* BUTTON */

.button{

    display:inline-block;

    align-self:flex-start;

    padding:14px 24px;

    border:1px solid #b88a44;

    color:#b88a44;

    text-decoration:none;

    font-size:16px;

    letter-spacing:1px;

    transition:.3s;
}

.button:hover{

    background:#b88a44;

    color:#111;

    box-shadow:0 0 20px rgba(184,138,68,.5);
}

/* MOBILE */

@media (max-width:900px){

.card{

    flex-direction:column;
}

.image-panel{

    width:100%;
}

.content{

    width:100%;

    padding:25px;
}

.title{

    font-size:36px;
}

.description{

    font-size:18px;
}

}

</style>

</head>

<body>

<div class="card">

    <div class="image-panel">

        <img src="https://raw.githubusercontent.com/robiezek-gif/revenia-campaign-assets/main/images/locations/Mnemosyne%20Entrance.jpg">

    </div>

    <div class="content">

        <div class="subtitle">

            FEATURED LOCATION

        </div>

        <div class="title">

            MNEMOSYNE SPRING

        </div>

        <div class="description">

            A spring of forgotten memories hidden among ancient ruins. Those who drink from its waters may glimpse moments long lost to time.

        </div>

        <a
        class="button"
        href="https://sites.google.com/view/archive-of-revenia/mnemosyne-spring"
        target="_blank">

            EXPLORE LOCATION →

        </a>

    </div>

</div>

</body>

</html>
